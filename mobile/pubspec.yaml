name: asyx_erp
description: "AsyxGroup ERP - Complete Business Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  pull_to_refresh: ^2.0.0
  flutter_slidable: ^3.0.1
  animations: ^2.0.8
  lottie: ^3.0.0
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.1.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/animations/
